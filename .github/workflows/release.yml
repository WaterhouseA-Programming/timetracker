name: Build & Release

on:
  push:
    branches: [master]

# Needed to create releases and push the version bump commit
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    # Skip if this is the automated version-bump commit (prevents infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN so the version-bump push doesn't re-trigger this workflow
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Read new version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "v${{ steps.pkg.outputs.version }} [skip ci]"
          git push

      - name: Install dependencies
        run: npm install

      - name: Build & publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
