name: Build & Release

on:
  push:
    branches: [master]
    paths-ignore:
      # Prevent infinite loop: when this workflow commits latest.yml to
      # tasks-web/updates/, that push must NOT re-trigger another release build.
      - 'tasks-web/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from run number
        # Uses major.minor from package.json, run number as patch (always increments)
        # e.g. package.json has 1.0.0 → built as 1.0.7, 1.0.8, 1.0.9 ...
        # Never commits back to the repo so no race conditions possible
        run: |
          $base = (node -p "require('./package.json').version") -replace '\.\d+$', ''
          npm version "$base.${{ github.run_number }}" --no-git-tag-version

      - name: Build & publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --publish always

      - name: Publish latest.yml to GitHub Pages
        # Rewrites the relative installer URL in dist/latest.yml to an absolute
        # GitHub Releases URL, then commits it to tasks-web/updates/ so the
        # deploy-web workflow will pick it up and serve it from Pages.
        shell: pwsh
        run: |
          $content = Get-Content dist/latest.yml -Raw
          $version = (Select-String -InputObject $content -Pattern 'version:\s+(.+)').Matches[0].Groups[1].Value.Trim()
          $ghBase  = "https://github.com/WaterhouseA-Programming/timetracker/releases/download/v$version"

          # Make installer URLs absolute so electron-updater downloads from GitHub Releases.
          # Match 'url: TimeTracker' and 'path: TimeTracker' regardless of leading whitespace
          # (YAML list items use '  - url:' where '- ' is not whitespace, so ^\s+url: never matched).
          $content = $content -replace '(url: )(TimeTracker)',  "`$1$ghBase/`$2"
          $content = $content -replace '(path: )(TimeTracker)', "`$1$ghBase/`$2"

          New-Item -Force -ItemType Directory -Path tasks-web/updates | Out-Null
          [System.IO.File]::WriteAllText("$PWD/tasks-web/updates/latest.yml", $content, [System.Text.UTF8Encoding]::new($false))

          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add tasks-web/updates/latest.yml
          git diff --cached --quiet && exit 0   # nothing changed, skip commit
          git commit -m "chore: publish latest.yml for v$version"
          git push
