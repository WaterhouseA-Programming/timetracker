<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasks">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>TimeTracker — Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a;
  --border:#222; --accent:#e8ff47; --red:#ff4757;
  --text:#f0f0f0; --muted:#555; --muted2:#888;
  --green:#47ff8a; --blue:#47c8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;
  border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:12px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.reconnect-btn{background:none;border:none;color:var(--muted2);font-size:11px;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;text-decoration:underline;text-underline-offset:2px}
.reconnect-btn:hover{color:var(--text)}

/* ── Main layout ── */
main{max-width:1120px;margin:0 auto;padding:20px}

/* ── Setup ── */
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:28px;max-width:460px;margin:32px auto}
.setup-card h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;margin-bottom:8px}
.setup-card p{font-size:12px;color:var(--muted2);line-height:1.7;margin-bottom:18px}
.cfg-area{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;
  outline:none;resize:vertical;line-height:1.5;transition:border-color .15s}
.cfg-area:focus{border-color:var(--accent)}
.error{font-size:11px;color:var(--red);margin-top:8px;display:none}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;padding:8px 16px;border-radius:6px;border:1px solid var(--border);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.03em;gap:5px}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted2)}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-icon{padding:6px 8px;font-size:13px}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.toolbar select{padding:7px 10px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none}
.toolbar select:focus{border-color:var(--accent)}
.toolbar-right{margin-left:auto;display:flex;gap:8px}

/* ── Columns ── */
.cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:640px){.cols{grid-template-columns:1fr}}

.col{display:flex;flex-direction:column;gap:7px}
.col-hdr{padding:7px 12px;border-radius:6px;background:var(--surface2);font-size:10px;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);display:flex;align-items:center;gap:6px}
.col-dot{width:7px;height:7px;border-radius:50%}
.col-count{margin-left:auto;background:var(--border);padding:1px 6px;border-radius:8px;font-size:10px}

/* ── Task card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;transition:border-color .15s}
.card:hover{border-color:#2a2a2a}
.card-title{font-size:12px;line-height:1.45;margin-bottom:5px}
.card-title.done{opacity:.38;text-decoration:line-through}
.card-meta{font-size:10px;color:var(--muted2);margin-bottom:8px}
.card-actions{display:flex;gap:5px;flex-wrap:wrap}
.card-btn{padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;
  color:var(--muted2);font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;cursor:pointer;transition:all .15s}
.card-btn:hover{color:var(--text);border-color:#3a3a3a}
.card-btn.advance{color:var(--accent);border-color:var(--accent)}
.card-btn.advance:hover{background:var(--accent);color:#000}
.card-btn.del{margin-left:auto}
.card-btn.del:hover{color:var(--red);border-color:var(--red)}

/* ── Add task button ── */
.add-task-btn{padding:9px;border:1px dashed var(--border);border-radius:8px;background:transparent;
  color:var(--muted);font-size:11px;cursor:pointer;text-align:center;transition:all .15s;
  width:100%;font-family:'Plus Jakarta Sans',sans-serif}
.add-task-btn:hover{border-color:#3a3a3a;color:var(--muted2)}

/* ── Empty ── */
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:12px}
.empty-icon{font-size:28px;margin-bottom:8px}

/* ── Pull to refresh ── */
#ptr{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;
  justify-content:center;font-size:12px;color:var(--muted2);background:var(--bg);
  transform:translateY(-52px);transition:transform .25s ease;z-index:50;border-bottom:1px solid var(--border)}
#ptr.visible{transform:translateY(0)}
#ptr.spinning span{display:inline-block;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;
  justify-content:center;z-index:100;backdrop-filter:blur(4px);padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:24px;width:100%;max-width:360px;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted2);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
/* ── Responsive ── */
@media(max-width:700px) {
  main { padding: 12px; }
  .cols { grid-template-columns: 1fr; }
  header { padding: 0 12px; }
  .toolbar { gap: 6px; }
  .toolbar select { font-size: 11px; padding: 5px 7px; }
  .toolbar-right { width: 100%; justify-content: flex-end; }
  .card { padding: 10px 11px; }
}
@media(min-width:701px) and (max-width:960px) {
  .cols { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div id="ptr"><span>↻</span> &nbsp;Release to refresh</div>
<header>
  <span class="logo">✓ Tasks</span>
  <div class="hdr-right">
    <div class="status">
      <div class="status-dot" id="sdot"></div>
      <span id="stext">Connecting…</span>
    </div>
    <button class="reconnect-btn" id="reconnect-btn" onclick="showSetup()" style="display:none">Reconnect</button>
  </div>
</header>

<main>
  <!-- Setup panel -->
  <div id="setup-panel" style="display:none">
    <div class="setup-card">
      <h2>Connect Firebase</h2>
      <p>Paste your Firebase config to sync tasks across all your devices. This is the same config used in the desktop app — you only set it up once per device.</p>
      <div class="field">
        <label>Firebase Config JSON</label>
        <textarea class="cfg-area" id="cfg-input" rows="7"
          placeholder='{
  "apiKey": "...",
  "authDomain": "...",
  "projectId": "...",
  "storageBucket": "...",
  "messagingSenderId": "...",
  "appId": "..."
}'></textarea>
      </div>
      <button class="btn btn-primary" onclick="connect()">Connect</button>
      <div class="error" id="cfg-error"></div>
    </div>
  </div>

  <!-- Board -->
  <div id="board" style="display:none">
    <div class="toolbar">
      <select id="f-cust" onchange="onFilterChange()"><option value="">All Customers</option></select>
      <select id="f-proj" onchange="renderBoard()"><option value="">All Projects</option></select>
      <div class="toolbar-right">
        <button class="btn btn-primary" onclick="openAddModal()">+ Task</button>
      </div>
    </div>
    <div class="cols" id="cols"></div>
  </div>
</main>

<!-- Add task modal -->
<div class="overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Add Task</h3>
    <div class="field">
      <label>Task Title</label>
      <input type="text" id="m-title" placeholder="e.g. Fix login bug" onkeydown="if(event.key==='Enter')saveTask()">
    </div>
    <div class="field">
      <label>Customer</label>
      <select id="m-cust" onchange="populateModalProjects()"></select>
    </div>
    <div class="field">
      <label>Project</label>
      <select id="m-proj"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, onSnapshot,
  addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── State ──────────────────────────────────────────────────────────────────────
let db = null;
let customers = [];   // [{ id, name, projects:[{id,name}] }]
let allProjects = []; // flat list
let tasks = [];

const STATUSES = [
  { id:'todo',       label:'To Do',       color:'#555'    },
  { id:'inprogress', label:'In Progress', color:'#47c8ff' },
  { id:'done',       label:'Done',        color:'#47ff8a' },
];

// ── Config ────────────────────────────────────────────────────────────────────
function loadCfg() { try { return JSON.parse(localStorage.getItem('tt_fb_config')); } catch { return null; } }
function saveCfg(c) { localStorage.setItem('tt_fb_config', JSON.stringify(c)); }

window.showSetup = function() {
  document.getElementById('board').style.display = 'none';
  document.getElementById('setup-panel').style.display = 'block';
};

// ── Connect ───────────────────────────────────────────────────────────────────
window.connect = async function() {
  const raw = document.getElementById('cfg-input').value.trim();
  const errEl = document.getElementById('cfg-error');
  errEl.style.display = 'none';
  let cfg;
  try {
    cfg = JSON.parse(raw);
    if (!cfg.projectId) throw new Error('Missing projectId');
  } catch {
    errEl.textContent = 'Invalid JSON — paste the full config object';
    errEl.style.display = 'block';
    return;
  }
  saveCfg(cfg);
  await initBoard(cfg);
};

async function initBoard(cfg) {
  try {
    const existing = getApps();
    const app = existing.length ? existing[0] : initializeApp(cfg);
    db = getFirestore(app);
    setStatus(true);
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('board').style.display = 'block';
    document.getElementById('reconnect-btn').style.display = 'inline';
    subscribeAll();
  } catch(e) {
    setStatus(false, e.message);
  }
}

// ── Subscriptions ─────────────────────────────────────────────────────────────
function showSyncError(msg) {
  setStatus(false, msg);
  // Show error visibly on the board too
  const cols = document.getElementById('cols');
  if (cols) cols.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div>${msg}</div>`;
}

function subscribeAll() {
  // Customers
  onSnapshot(collection(db,'customers'), snap => {
    const cMap = {};
    snap.docs.forEach(d => { cMap[d.id] = { id:d.id, ...d.data(), projects:[] }; });
    allProjects.forEach(p => { if (cMap[p.customerId]) cMap[p.customerId].projects.push(p); });
    customers = Object.values(cMap).sort((a,b) => a.name.localeCompare(b.name));
    populateFilters();
    renderBoard();
  }, err => showSyncError('Customers: ' + err.message));

  // Projects
  onSnapshot(collection(db,'projects'), snap => {
    allProjects = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    customers.forEach(c => { c.projects = allProjects.filter(p => p.customerId === c.id); });
    populateFilters();
    renderBoard();
  }, err => showSyncError('Projects: ' + err.message));

  // Tasks
  onSnapshot(query(collection(db,'tasks'), orderBy('createdAt','asc')), snap => {
    tasks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderBoard();
  }, err => {
    // orderBy needs an index — fall back without ordering
    onSnapshot(collection(db,'tasks'), snap => {
      tasks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderBoard();
    }, err2 => showSyncError('Tasks: ' + err2.message));
  });
}

// ── Filters ───────────────────────────────────────────────────────────────────
function populateFilters() {
  const cs = document.getElementById('f-cust');
  const cur = cs.value;
  cs.innerHTML = '<option value="">All Customers</option>' +
    customers.map(c => `<option value="${c.id}"${c.id===cur?' selected':''}>${esc(c.name)}</option>`).join('');
  populateProjFilter();
}

function populateProjFilter() {
  const cc = document.getElementById('f-cust').value;
  const ps = document.getElementById('f-proj');
  const cur = ps.value;
  const projs = cc ? (customers.find(c=>c.id===cc)?.projects||[]) : allProjects;
  ps.innerHTML = '<option value="">All Projects</option>' +
    projs.map(p => `<option value="${p.id}"${p.id===cur?' selected':''}>${esc(p.name)}</option>`).join('');
}

window.onFilterChange = function() { populateProjFilter(); renderBoard(); };

// ── Render ────────────────────────────────────────────────────────────────────
function renderBoard() {
  const cc = document.getElementById('f-cust')?.value || '';
  const cp = document.getElementById('f-proj')?.value  || '';
  let filtered = tasks;
  if (cc) filtered = filtered.filter(t => t.customerId === cc);
  if (cp) filtered = filtered.filter(t => t.projectId  === cp);

  const cols = document.getElementById('cols');
  const noProjects = !allProjects.length;
  cols.innerHTML = STATUSES.map(s => {
    const col = filtered.filter(t => t.status === s.id);
    const cards = col.length
      ? col.map(t => cardHtml(t)).join('')
      : s.id === 'todo' && noProjects
        ? `<div class="empty"><div class="empty-icon">👋</div>Add customers & projects<br>in the desktop app first</div>`
        : `<div class="empty"><div class="empty-icon">·</div>No tasks</div>`;
    const addBtns = s.id === 'todo' ? addButtons(cc, cp) : '';
    return `<div class="col">
      <div class="col-hdr">
        <span class="col-dot" style="background:${s.color}"></span>
        ${s.label}
        <span class="col-count">${col.length}</span>
      </div>
      ${cards}
      ${addBtns}
    </div>`;
  }).join('');
}

function cardHtml(t) {
  const done = t.status === 'done';
  const next = t.status === 'todo' ? 'inprogress' : 'done';
  const nextLbl = t.status === 'todo' ? '→ Progress' : '✓ Done';
  return `<div class="card">
    <div class="card-title${done?' done':''}">${esc(t.title)}</div>
    <div class="card-meta">${esc(t.customerName||'')} › ${esc(t.projectName||'')}</div>
    <div class="card-actions">
      ${!done ? `<button class="card-btn advance" onclick="advance('${t.id}','${next}')">${nextLbl}</button>` : ''}
      ${done  ? `<button class="card-btn" onclick="advance('${t.id}','todo')">↺ Reopen</button>` : ''}
      <button class="card-btn del" onclick="remove('${t.id}')">✕</button>
    </div>
  </div>`;
}

function addButtons(cc, cp) {
  const visible = cc
    ? (cp
        ? allProjects.filter(p => p.id === cp)
        : allProjects.filter(p => p.customerId === cc))
    : allProjects;
  if (!visible.length) return `<button class="add-task-btn" onclick="openAddModal()">+ Add task</button>`;
  return visible.slice(0,3).map(p => {
    const c = customers.find(x => x.id === p.customerId);
    return `<button class="add-task-btn"
      onclick='openAddModal("${p.customerId}","${p.id}")'>
      + ${esc(c?.name||'')} › ${esc(p.name)}</button>`;
  }).join('') + (visible.length > 3 ? `<button class="add-task-btn" onclick="openAddModal()">+ More…</button>` : '');
}

// ── Task CRUD ─────────────────────────────────────────────────────────────────
window.advance = async function(id, status) {
  await updateDoc(doc(db,'tasks',id), { status });
};

window.remove = async function(id) {
  await deleteDoc(doc(db,'tasks',id));
};

// ── Add modal ─────────────────────────────────────────────────────────────────
window.openAddModal = function(presetCustId, presetProjId) {
  const cs = document.getElementById('m-cust');
  cs.innerHTML = customers.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  if (presetCustId) cs.value = presetCustId;
  populateModalProjects();
  if (presetProjId) document.getElementById('m-proj').value = presetProjId;
  document.getElementById('m-title').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('m-title').focus(), 60);
};

window.populateModalProjects = function() {
  const cid = document.getElementById('m-cust').value;
  const projs = allProjects.filter(p => p.customerId === cid);
  document.getElementById('m-proj').innerHTML =
    projs.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
};

window.closeModal = function(e) {
  if (!e || e.target === document.getElementById('modal'))
    document.getElementById('modal').style.display = 'none';
};

window.saveTask = async function() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) return;
  const cid = document.getElementById('m-cust').value;
  const pid = document.getElementById('m-proj').value;
  const cust = customers.find(c => c.id === cid);
  const proj = allProjects.find(p => p.id === pid);
  if (!cust || !proj) return;
  await addDoc(collection(db,'tasks'), {
    title, status:'todo',
    customerId:cid, customerName:cust.name,
    projectId:pid,  projectName:proj.name,
    createdAt: serverTimestamp(),
  });
  document.getElementById('modal').style.display = 'none';
};

// ── Status indicator ──────────────────────────────────────────────────────────
function setStatus(on, msg) {
  document.getElementById('sdot').className   = 'status-dot' + (on ? ' on' : '');
  document.getElementById('stext').textContent = on ? 'Synced' : (msg || 'Not connected');
}

// ── Pull to refresh ───────────────────────────────────────────────────────────
(function() {
  let startY = 0, pulling = false;
  const ptr = document.getElementById('ptr');
  const THRESHOLD = 72;

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if (dist > 10) ptr.classList.add('visible');
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dist = e.changedTouches[0].clientY - startY;
    if (dist > THRESHOLD && db) {
      ptr.classList.add('spinning');
      subscribeAll();
      setTimeout(() => { ptr.classList.remove('visible','spinning'); }, 1200);
    } else {
      ptr.classList.remove('visible');
    }
  }, { passive: true });
})();

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal').style.display='none'; });

// ── Service Worker registration ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const saved = loadCfg();
if (saved) {
  initBoard(saved);
} else {
  document.getElementById('setup-panel').style.display = 'block';
  setStatus(false, 'Not connected');
}
</script>
</body>
</html>
